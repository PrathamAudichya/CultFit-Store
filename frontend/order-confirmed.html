<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - CultFit Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .success-wrapper {
            min-height: calc(100vh - 80px); /* minus nav */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .success-card {
            max-width: 500px;
            padding: 4rem 3rem;
        }
        .confetti-icon {
            font-size: 6rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-title {
            color: var(--success-color);
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }
        .success-message {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Particle animations just for the wow-factor */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">CultFit Store</a>
            <div class="nav-links"><a href="index.html" class="nav-link">Home</a></div>
        </div>
    </nav>

    <main class="container success-wrapper fade-in">
        <div class="particles" id="particles"></div>
        <div class="glass-card success-card" style="position: relative;">
            <div class="confetti-icon">🎉</div>
            <h1 class="success-title">Order Confirmed!</h1>
            <p class="success-message">Thank you for gearing up at CultFit Store. Your payment was successful and we're officially processing your order.</p>
            
            <div class="action-buttons">
                <a href="dashboard.html" class="btn">View My Orders</a>
                <a id="receipt-btn" class="btn" style="display:none; background: #6c5ce7; border: none; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);">Download Receipt</a>
                <a href="products.html" class="btn" style="background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border-color); box-shadow: none;">Continue Shopping</a>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Check if user is logged in
        window.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'index.html';
            }
            createSimpleParticles();

            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            if(orderId) {
                const rBtn = document.getElementById('receipt-btn');
                rBtn.style.display = 'inline-block';
                rBtn.href = `receipt.html?id=${orderId}`;
            }
        });
        
        // Simple visual particles
        function createSimpleParticles() {
            const container = document.getElementById('particles');
            const colors = ['#00ff88', '#8a2be2', '#009955', '#1A1A1A'];
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 10 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.position = 'absolute';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                p.style.transition = 'transform 10s ease-out';
                container.appendChild(p);
                
                setTimeout(() => {
                    p.style.transform = `translate(${(Math.random() - 0.5) * 500}px, ${(Math.random() - 0.5) * 500}px) rotate(${Math.random() * 360}deg)`;
                }, 100);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt - CultFit Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f8; color: #1e293b; padding: 2rem; margin: 0; }
        .receipt-container { max-width: 800px; margin: 0 auto; background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .company-name { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0; }
        .invoice-title { font-size: 2.2rem; color: #64748b; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .meta-info { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .info-block p { margin: 0.3rem 0; font-size: 0.95rem; }
        .info-block strong { color: #334155; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; padding: 1rem; text-align: left; }
        td { padding: 1.2rem 1rem; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        th:last-child, td:last-child { text-align: right; }
        .totals { width: 300px; margin-left: auto; }
        .totals-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid #f1f5f9; }
        .totals-row:last-child { border-bottom: none; font-size: 1.2rem; font-weight: 800; border-top: 2px solid #cbd5e1; padding-top: 1rem; }
        .actions { text-align: center; margin-top: 3rem; }
        .btn { background: #0f172a; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; }
        @media print {
            body { background: white; padding: 0; }
            .receipt-container { box-shadow: none; max-width: 100%; padding: 0; }
            .actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="receipt-container" id="receipt-content">
        <div class="header">
            <div>
                <h1 class="company-name">CultFit Store</h1>
                <p style="color:#64748b; margin: 0.5rem 0 0;">Premium Gym Equipments & Supplements</p>
            </div>
            <div>
                <h1 class="invoice-title">RECEIPT</h1>
            </div>
        </div>

        <div class="meta-info">
            <div class="info-block" id="order-meta">
                <!-- Injected via JS -->
            </div>
            <div class="info-block" style="text-align: right;" id="customer-meta">
                <!-- Injected via JS -->
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item Description</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Tax</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="items-body">
                <!-- Injected via JS -->
            </tbody>
        </table>

        <div class="totals" id="totals-container">
            <!-- Injected via JS -->
        </div>

        <div class="actions">
            <button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
            <button class="btn" style="background:#e2e8f0; color:#0f172a; margin-left: 1rem;" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            if (!userToken) { window.location.href = 'login.html'; return; }
            
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            if(!orderId) { alert("Invalid receipt link"); return; }

            try {
                const res = await fetch(`${window.API_URL}/orders/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                
                if(!res.ok) throw new Error("Failed to load");
                const json = await res.json();
                const order = json.data || json;
                
                if(!order) {
                    document.getElementById('receipt-content').innerHTML = `<h2>Order not found or unauthorized</h2><button onclick="window.location.href='dashboard.html'" class="btn">Back to Dashboard</button>`;
                    return;
                }

                // Render Content
                document.getElementById('order-meta').innerHTML = `
                    <p><strong>Order ID:</strong> #${order.id}</p>
                    <p><strong>Date:</strong> ${new Date(order.created_at).toLocaleString()}</p>
                    <p><strong>Payment Method:</strong> ${order.payment_method || 'COD'}</p>
                    <p><strong>Transaction ID:</strong> ${order.transaction_id || 'N/A'}</p>
                    <p><strong>Status:</strong> ${order.status}</p>
                `;

                document.getElementById('customer-meta').innerHTML = `
                    <p><strong>Billed To:</strong></p>
                    <p>${order.recipient_name} (User #${order.user_id})</p>
                    <p>${order.address_line1}, ${order.city}</p>
                    <p>${order.state} - ${order.pin_code}</p>
                    <p>Phone: ${order.address_phone}</p>
                    <p>Payment Status: <span style="color:#10b981; font-weight:600;">${order.payment_status}</span></p>
                `;

                const tbody = document.getElementById('items-body');
                order.items.forEach(item => {
                    const price = parseFloat(item.price);
                    const qty = parseInt(item.quantity);
                    // Approximate tax breakdown from existing view/totals. 
                    const displayTotal = price * qty;
                    const taxAmount = parseFloat(item.tax_amount);
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${item.title}</strong></td>
                            <td>${qty}</td>
                            <td>${formatPrice(price)}</td>
                            <td>${formatPrice(taxAmount)} (${item.tax_percentage}%)</td>
                            <td>${formatPrice(displayTotal + taxAmount)}</td>
                        </tr>
                    `;
                });

                document.getElementById('totals-container').innerHTML = `
                    <div class="totals-row"><span>Subtotal:</span><span>${formatPrice(order.subtotal)}</span></div>
                    <div class="totals-row"><span>GST:</span><span>${formatPrice(order.tax_amount)}</span></div>
                    <div class="totals-row" style="color:#ef4444;"><span>Discount:</span><span>-${formatPrice(order.discount_amount)}</span></div>
                    <div class="totals-row"><span>Grand Total:</span><span>${formatPrice(order.total_price)}</span></div>
                `;

            } catch(e) {
                console.error(e);
                alert("Error loading receipt");
            }
        });
    </script>
</body>
</html>
